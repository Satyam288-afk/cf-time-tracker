<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; margin: 0; }
    h3 { margin-top: 0; color: #333; }
    label { font-size: 13px; font-weight: bold; color: #555; }
    input { width: 100%; box-sizing: border-box; margin: 8px 0 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #5865F2; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #4752C4; }
    #status { font-size: 12px; color: #43b581; font-weight: bold; min-height: 15px; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h3>CF Discord Tracker</h3>
  <label for="token">Extension Token:</label>
  <input type="text" id="token" placeholder="Use !link in Discord" />
  <button id="save">Save Token</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
